<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SummerMax Alpha · 设置</title>
    <style>
      :root {
        --bg: #07111f; --panel: rgba(10,22,38,0.9); --line: rgba(132,157,189,0.15);
        --text: #edf4ff; --muted: #8ea3bd; --muted-2: #5a7490;
        --accent: #66d1ff; --bull: #2ed09a; --bear: #ff6b7e; --warn: #f5c26b;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { min-height: 100%; color: var(--text); font-family: "PingFang SC","Noto Sans SC","Avenir Next",sans-serif; font-size: 14px; background: #07111f; }
      ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: rgba(102,209,255,0.18); border-radius: 2px; }

      /* ── Topbar ── */
      .topbar { height: 48px; display: flex; align-items: center; gap: 12px; padding: 0 16px; border-bottom: 1px solid var(--line); background: rgba(6,15,28,0.98); position: sticky; top: 0; z-index: 100; }
      .brand-mark { display: grid; place-items: center; width: 30px; height: 30px; border-radius: 8px; background: linear-gradient(135deg,rgba(102,209,255,0.22),rgba(36,163,135,0.28)); border: 1px solid rgba(102,209,255,0.2); font-size: 0.78rem; font-weight: 800; flex-shrink: 0; }
      .brand-name { font-size: 0.88rem; font-weight: 700; white-space: nowrap; }
      .topbar-divider { width: 1px; height: 20px; background: var(--line); flex-shrink: 0; }
      .page-nav { display: flex; gap: 2px; }
      .page-nav a { padding: 5px 10px; border-radius: 8px; text-decoration: none; color: var(--muted); font-size: 0.82rem; transition: background 0.15s,color 0.15s; }
      .page-nav a:hover { background: rgba(255,255,255,0.05); color: var(--text); }
      .page-nav a.active { background: rgba(102,209,255,0.12); color: var(--accent); font-weight: 700; }
      .topbar-spacer { flex: 1; }
      .user-badge { display: flex; align-items: center; gap: 8px; flex-shrink: 0; font-size: 0.76rem; color: var(--muted); }
      .user-role { font-size: 0.66rem; padding: 2px 7px; border-radius: 5px; background: rgba(102,209,255,0.1); border: 1px solid rgba(102,209,255,0.15); color: var(--muted-2); }
      .user-role.admin { background: rgba(255,195,50,0.12); border-color: rgba(255,195,50,0.2); color: #ffc332; }
      .logout-btn { padding: 4px 10px; border-radius: 7px; border: 1px solid rgba(132,157,189,0.2); background: transparent; color: var(--muted-2); font-size: 0.74rem; cursor: pointer; transition: color 0.15s,border-color 0.15s; }
      .logout-btn:hover { color: var(--bear); border-color: rgba(255,107,126,0.3); }

      /* ── Page body ── */
      .page { max-width: 680px; margin: 32px auto; padding: 0 20px 60px; }
      .page-title { font-size: 1.3rem; font-weight: 800; margin-bottom: 6px; }
      .page-sub { font-size: 0.8rem; color: var(--muted-2); margin-bottom: 28px; }

      /* ── Tabs ── */
      .tabs { display: flex; gap: 3px; border-bottom: 1px solid var(--line); margin-bottom: 24px; }
      .tab-btn { padding: 8px 16px; border: none; background: transparent; color: var(--muted-2); font-family: inherit; font-size: 0.82rem; font-weight: 600; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; }
      .tab-btn:hover { color: var(--muted); }
      .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
      .tab-panel { display: none; } .tab-panel.active { display: block; }

      /* ── Card ── */
      .card { background: rgba(10,22,38,0.6); border: 1px solid var(--line); border-radius: 12px; margin-bottom: 14px; overflow: hidden; }
      .card-head { padding: 12px 16px 10px; border-bottom: 1px solid var(--line); }
      .card-title { font-size: 0.82rem; font-weight: 700; color: var(--muted); }
      .card-body { padding: 16px; display: flex; flex-direction: column; gap: 14px; }

      /* ── Form elements ── */
      label { display: block; font-size: 0.72rem; color: var(--muted-2); font-weight: 600; margin-bottom: 5px; letter-spacing: 0.04em; }
      input[type="email"], input[type="password"], input[type="text"] {
        width: 100%; background: rgba(10,22,38,0.8); border: 1px solid rgba(132,157,189,0.2); border-radius: 9px;
        color: var(--text); font-family: inherit; font-size: 0.88rem; padding: 9px 12px; outline: none; transition: border-color 0.2s;
      }
      input:focus { border-color: rgba(102,209,255,0.35); }
      input:disabled { opacity: 0.4; cursor: not-allowed; }
      input::placeholder { color: var(--muted-2); }

      /* ── Buttons ── */
      .btn-primary { padding: 9px 20px; border-radius: 9px; border: 1px solid rgba(102,209,255,0.25); background: linear-gradient(135deg,rgba(102,209,255,0.22),rgba(36,163,135,0.18)); color: var(--accent); font-family: inherit; font-size: 0.82rem; font-weight: 700; cursor: pointer; transition: background 0.15s; }
      .btn-primary:hover:not(:disabled) { background: linear-gradient(135deg,rgba(102,209,255,0.34),rgba(36,163,135,0.28)); }
      .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }
      .btn-danger { padding: 9px 20px; border-radius: 9px; border: 1px solid rgba(255,107,126,0.25); background: rgba(255,107,126,0.08); color: var(--bear); font-family: inherit; font-size: 0.82rem; font-weight: 700; cursor: pointer; transition: background 0.15s; }
      .btn-danger:hover:not(:disabled) { background: rgba(255,107,126,0.16); }

      /* ── Status msg ── */
      .status-msg { font-size: 0.78rem; min-height: 18px; margin-top: 4px; }
      .status-msg.ok { color: var(--bull); } .status-msg.err { color: var(--bear); } .status-msg.info { color: var(--muted-2); }

      /* ── Balance display ── */
      .balance-hero { display: flex; align-items: center; gap: 16px; padding: 12px 0; }
      .balance-num { font-size: 3rem; font-weight: 900; color: var(--accent); line-height: 1; }
      .balance-label { font-size: 0.8rem; color: var(--muted-2); }
      .balance-note { font-size: 0.72rem; color: var(--muted-2); margin-top: 3px; }

      /* ── Usage log ── */
      .usage-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid rgba(132,157,189,0.07); font-size: 0.76rem; }
      .usage-row:last-child { border-bottom: none; }
      .usage-model { color: var(--accent); font-size: 0.7rem; }
      .usage-cost { color: var(--bear); font-weight: 700; }
      .usage-time { color: var(--muted-2); font-size: 0.68rem; }

      /* ── Model selector ── */
      .model-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
      .model-card { padding: 12px 14px; border-radius: 10px; border: 1px solid var(--line); background: rgba(10,22,38,0.5); cursor: pointer; transition: all 0.15s; position: relative; }
      .model-card:hover { border-color: rgba(102,209,255,0.3); background: rgba(102,209,255,0.05); }
      .model-card.selected { border-color: rgba(102,209,255,0.5); background: rgba(102,209,255,0.1); }
      .model-card input[type="radio"] { position: absolute; opacity: 0; pointer-events: none; }
      .model-name { font-size: 0.84rem; font-weight: 700; margin-bottom: 3px; }
      .model-desc { font-size: 0.68rem; color: var(--muted-2); line-height: 1.4; }
      .model-badge { display: inline-block; font-size: 0.62rem; padding: 1px 6px; border-radius: 4px; font-weight: 700; margin-left: 5px; vertical-align: middle; }
      .badge-rec { background: rgba(46,208,154,0.18); color: var(--bull); border: 1px solid rgba(46,208,154,0.25); }
      .badge-fast { background: rgba(102,209,255,0.12); color: var(--accent); border: 1px solid rgba(102,209,255,0.2); }
      .badge-eco { background: rgba(245,194,107,0.14); color: var(--warn); border: 1px solid rgba(245,194,107,0.22); }

      /* ── Admin panel ── */
      .admin-row { display: flex; gap: 8px; align-items: flex-end; }
      .admin-row input { flex: 1; }
      .admin-row .delta-input { width: 90px; flex: none; }
      .user-table { width: 100%; border-collapse: collapse; font-size: 0.76rem; }
      .user-table th { text-align: left; padding: 6px 8px; color: var(--muted-2); font-weight: 600; font-size: 0.68rem; border-bottom: 1px solid var(--line); }
      .user-table td { padding: 7px 8px; border-bottom: 1px solid rgba(132,157,189,0.06); }
      .user-table tr:last-child td { border-bottom: none; }
      .td-balance { color: var(--accent); font-weight: 700; }
      .td-role-admin { color: var(--warn); font-weight: 700; }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="brand-mark">Sα</div>
      <span class="brand-name">SummerMax Alpha</span>
      <div class="topbar-divider"></div>
      <nav class="page-nav">
        <a href="/home">首页</a>
        <a href="/scan">市场扫描</a>
        <a href="/workspace">工作台</a>
        <a href="/chat">AI 分析师</a>
        <a href="/tools">工具箱</a>
        <a href="/settings" class="active">设置</a>
      </nav>
      <div class="topbar-spacer"></div>
      <div class="user-badge" id="userBadge"></div>
    </header>

    <div class="page">
      <div class="page-title">设置</div>
      <div class="page-sub" id="pageSubtitle">账户管理 · 积分余额 · AI 模型</div>

      <div class="tabs">
        <button class="tab-btn active" data-tab="account">账户</button>
        <button class="tab-btn" data-tab="balance">积分余额</button>
        <button class="tab-btn" data-tab="model">AI 模型</button>
        <button class="tab-btn admin-only" data-tab="admin" style="display:none">管理员</button>
      </div>

      <!-- ── 账户 tab ── -->
      <div class="tab-panel active" id="tab-account">
        <div class="card">
          <div class="card-head"><div class="card-title">账户信息</div></div>
          <div class="card-body">
            <div>
              <label>邮箱</label>
              <input type="email" id="accountEmail" disabled />
            </div>
            <div>
              <label>角色</label>
              <input type="text" id="accountRole" disabled />
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-head"><div class="card-title">修改密码</div></div>
          <div class="card-body">
            <div>
              <label>当前密码</label>
              <input type="password" id="curPassword" placeholder="请输入当前密码" autocomplete="current-password" />
            </div>
            <div>
              <label>新密码（至少 8 位）</label>
              <input type="password" id="newPassword" placeholder="设置新密码" autocomplete="new-password" />
            </div>
            <div>
              <label>确认新密码</label>
              <input type="password" id="newPassword2" placeholder="再次输入新密码" autocomplete="new-password" />
            </div>
            <div>
              <button class="btn-primary" id="changePwBtn">确认修改</button>
              <div class="status-msg" id="pwStatus"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- ── 余额 tab ── -->
      <div class="tab-panel" id="tab-balance">
        <div class="card">
          <div class="card-head"><div class="card-title">积分余额</div></div>
          <div class="card-body">
            <div class="balance-hero">
              <div>
                <div class="balance-num" id="balanceNum">--</div>
                <div class="balance-label">剩余积分</div>
              </div>
              <div>
                <div class="balance-note">每次 AI 对话消耗 1 积分</div>
                <div class="balance-note" style="margin-top:4px">积分不足请联系管理员充值</div>
              </div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-head"><div class="card-title">使用记录（最近 20 次）</div></div>
          <div class="card-body" style="padding:8px 16px">
            <div id="usageList"><div style="color:var(--muted-2);font-size:0.8rem;padding:12px 0">加载中…</div></div>
          </div>
        </div>
      </div>

      <!-- ── 模型 tab ── -->
      <div class="tab-panel" id="tab-model">
        <div class="card">
          <div class="card-head"><div class="card-title">选择 AI 模型</div></div>
          <div class="card-body">
            <div style="font-size:0.76rem;color:var(--muted-2);margin-bottom:4px">选择后立即生效，影响 AI 分析师的回答质量和速度</div>
            <div class="model-grid" id="modelGrid">
              <!-- Rendered by JS -->
            </div>
            <div style="margin-top:14px">
              <button class="btn-primary" id="saveModelBtn">保存模型设置</button>
              <div class="status-msg" id="modelStatus"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- ── 管理员 tab ── -->
      <div class="tab-panel" id="tab-admin">
        <div class="card">
          <div class="card-head"><div class="card-title">积分充值</div></div>
          <div class="card-body">
            <div>
              <label>用户邮箱</label>
              <div class="admin-row">
                <input type="email" id="adminEmail" placeholder="user@example.com" />
                <input type="number" class="delta-input" id="adminDelta" placeholder="积分" value="100" />
                <button class="btn-primary" id="adminAddBtn">充值</button>
              </div>
              <div class="status-msg" id="adminStatus"></div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-head"><div class="card-title">所有用户</div></div>
          <div class="card-body" style="padding:8px 16px">
            <div id="userListWrap"><div style="color:var(--muted-2);font-size:0.8rem;padding:12px 0">加载中…</div></div>
          </div>
        </div>
      </div>

    </div>

    <script src="/app/settings.js?v=20260624-hotfix1"></script>
  </body>
</html>
