<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SummerMax Alpha · AI 分析师</title>
    <style>
      :root {
        --bg: #07111f;
        --panel: rgba(10, 22, 38, 0.9);
        --line: rgba(132, 157, 189, 0.15);
        --text: #edf4ff;
        --muted: #8ea3bd;
        --muted-2: #5a7490;
        --accent: #66d1ff;
        --bull: #2ed09a;
        --bear: #ff6b7e;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        height: 100%;
        color: var(--text);
        font-family: "PingFang SC", "Noto Sans SC", "Avenir Next", sans-serif;
        font-size: 13px;
        background: #07111f;
        overflow: hidden;
      }

      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(102,209,255,0.18); border-radius: 2px; }

      .up { color: var(--bull); }
      .down { color: var(--bear); }

      /* ── Topbar ── */
      .topbar {
        height: 48px;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 0 16px;
        border-bottom: 1px solid var(--line);
        background: rgba(6, 15, 28, 0.98);
        position: relative;
        z-index: 100;
        flex-shrink: 0;
      }

      .brand-mark {
        display: grid;
        place-items: center;
        width: 30px; height: 30px;
        border-radius: 8px;
        background: linear-gradient(135deg, rgba(102,209,255,0.22), rgba(36,163,135,0.28));
        border: 1px solid rgba(102,209,255,0.2);
        font-size: 0.78rem; font-weight: 800;
        flex-shrink: 0;
      }

      .brand-name { font-size: 0.88rem; font-weight: 700; white-space: nowrap; }

      .topbar-divider { width: 1px; height: 20px; background: var(--line); flex-shrink: 0; }

      .page-nav { display: flex; gap: 2px; }
      .page-nav a {
        padding: 5px 10px; border-radius: 8px;
        text-decoration: none; color: var(--muted);
        font-size: 0.82rem;
        transition: background 0.15s, color 0.15s;
      }
      .page-nav a:hover { background: rgba(255,255,255,0.05); color: var(--text); }
      .page-nav a.active { background: rgba(102,209,255,0.12); color: var(--accent); font-weight: 700; }

      .topbar-spacer { flex: 1; }

      .clear-btn {
        padding: 5px 12px; border-radius: 8px;
        border: 1px solid rgba(132,157,189,0.2);
        background: transparent; color: var(--muted-2);
        font-size: 0.76rem; cursor: pointer;
        transition: color 0.15s, border-color 0.15s;
        white-space: nowrap;
      }
      .clear-btn:hover { color: var(--bear); border-color: rgba(255,107,126,0.3); }

      /* ── Market bar ── */
      .market-bar {
        display: flex; align-items: center; gap: 14px;
        padding: 6px 16px;
        border-bottom: 1px solid var(--line);
        background: rgba(5, 12, 24, 0.7);
        flex-shrink: 0;
        overflow-x: auto; white-space: nowrap;
        font-size: 0.75rem;
        height: 34px;
      }
      .market-bar::-webkit-scrollbar { height: 2px; }

      .mkt-idx { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
      .mkt-idx-name { color: var(--muted-2); }
      .mkt-idx-price { font-weight: 700; }
      .mkt-divider { width: 1px; height: 12px; background: var(--line); flex-shrink: 0; }
      .mkt-sector {
        display: inline-flex; align-items: center; gap: 4px;
        padding: 1px 7px; border-radius: 5px;
        background: rgba(102,209,255,0.06);
        border: 1px solid rgba(102,209,255,0.1);
        font-size: 0.7rem; flex-shrink: 0;
      }
      .mkt-label { color: var(--muted-2); font-size: 0.68rem; letter-spacing: 0.05em; }
      .mkt-loading { color: var(--muted-2); font-size: 0.74rem; font-style: italic; }

      /* ── Main shell ── */
      .shell {
        display: grid;
        grid-template-columns: 430px 1fr;
        height: calc(100vh - 48px - 34px);
        overflow: hidden;
      }

      /* ══════════════════════════════════════════
         LEFT: Full-market matrix
      ══════════════════════════════════════════ */
      .matrix-col {
        border-right: 1px solid var(--line);
        display: flex; flex-direction: column;
        overflow: hidden;
        background: rgba(5, 12, 24, 0.4);
      }

      .matrix-head {
        flex-shrink: 0;
        border-bottom: 1px solid var(--line);
        background: rgba(5, 13, 26, 0.9);
      }

      .matrix-stats-bar {
        display: flex; align-items: center; justify-content: space-between;
        padding: 7px 12px 6px;
        font-size: 0.72rem; color: var(--muted-2);
        border-bottom: 1px solid rgba(132,157,189,0.08);
      }

      .stat-chips { display: flex; gap: 8px; align-items: center; }
      .stat-chip { display: flex; align-items: center; gap: 3px; }
      .stat-count { font-weight: 700; font-size: 0.8rem; }
      .stat-total { color: var(--accent); font-weight: 700; }

      .matrix-controls {
        display: flex; align-items: center; gap: 8px;
        padding: 6px 12px;
        border-bottom: 1px solid rgba(132,157,189,0.08);
      }

      #stockSearch {
        flex: 1; background: rgba(10,22,38,0.8);
        border: 1px solid rgba(132,157,189,0.18);
        border-radius: 7px; color: var(--text);
        font-family: inherit; font-size: 0.78rem;
        padding: 5px 10px; outline: none;
      }
      #stockSearch::placeholder { color: var(--muted-2); }
      #stockSearch:focus { border-color: rgba(102,209,255,0.3); }

      .sort-tabs { display: flex; gap: 3px; flex-shrink: 0; }
      .sort-tab {
        padding: 4px 8px; border-radius: 6px;
        border: 1px solid rgba(132,157,189,0.15);
        background: transparent; color: var(--muted-2);
        font-size: 0.72rem; cursor: pointer;
        transition: all 0.12s;
        white-space: nowrap;
      }
      .sort-tab:hover { color: var(--text); border-color: rgba(132,157,189,0.3); }
      .sort-tab.active { background: rgba(102,209,255,0.12); color: var(--accent); border-color: rgba(102,209,255,0.22); font-weight: 700; }

      .matrix-col-head {
        display: grid;
        grid-template-columns: 28px 1fr 62px 68px 64px 54px 50px;
        gap: 4px;
        padding: 5px 12px;
        font-size: 0.67rem; color: var(--muted-2);
        letter-spacing: 0.03em;
      }

      #matrixList { flex: 1; overflow-y: auto; }

      .matrix-row {
        display: grid;
        grid-template-columns: 28px 1fr 62px 68px 64px 54px 50px;
        gap: 4px;
        align-items: center;
        padding: 5px 12px;
        border-bottom: 1px solid rgba(132,157,189,0.055);
        transition: background 0.08s;
        cursor: default;
      }
      .matrix-row:hover { background: rgba(102,209,255,0.04); }

      .mx-rank { color: var(--muted-2); font-size: 0.68rem; text-align: center; }
      .mx-id { display: flex; flex-direction: column; gap: 1px; min-width: 0; }
      .mx-code { font-size: 0.72rem; font-weight: 700; color: var(--accent); }
      .mx-name { font-size: 0.7rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .mx-price { font-size: 0.78rem; font-weight: 600; text-align: right; }
      .mx-chg { font-size: 0.8rem; font-weight: 700; text-align: right; }
      .mx-amount { font-size: 0.72rem; color: var(--muted); text-align: right; }
      .mx-turn { font-size: 0.72rem; color: var(--muted); text-align: right; }

      .btn-analyze-sm {
        display: inline-flex; align-items: center; justify-content: center;
        padding: 3px 7px; border-radius: 6px;
        background: rgba(102,209,255,0.1);
        border: 1px solid rgba(102,209,255,0.18);
        color: var(--text); text-decoration: none;
        font-size: 0.68rem; font-weight: 700;
        transition: background 0.12s; white-space: nowrap;
      }
      .btn-analyze-sm:hover { background: rgba(102,209,255,0.22); }

      .matrix-loading {
        padding: 20px 14px;
        color: var(--muted-2); font-size: 0.8rem;
        line-height: 1.8; text-align: center;
      }

      .matrix-empty {
        padding: 20px 14px;
        color: var(--muted-2); font-size: 0.8rem;
        text-align: center;
      }

      /* ══════════════════════════════════════════
         RIGHT: Chat
      ══════════════════════════════════════════ */
      .chat-col {
        display: flex; flex-direction: column;
        overflow: hidden;
      }

      .messages {
        flex: 1; overflow-y: auto;
        padding: 18px 18px 10px;
        display: flex; flex-direction: column;
        gap: 16px;
      }

      .empty-state {
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        flex: 1; gap: 10px;
        color: var(--muted-2); text-align: center; padding: 30px;
      }
      .empty-icon { font-size: 2rem; opacity: 0.3; }
      .empty-title { font-size: 0.96rem; font-weight: 700; color: var(--muted); }
      .empty-desc { font-size: 0.8rem; line-height: 1.7; max-width: 320px; }

      .suggestions {
        display: flex; flex-wrap: wrap; gap: 7px;
        justify-content: center; margin-top: 6px;
      }
      .suggestion-chip {
        padding: 6px 12px; border-radius: 18px;
        border: 1px solid rgba(102,209,255,0.2);
        background: rgba(102,209,255,0.06);
        color: var(--accent); font-size: 0.75rem;
        cursor: pointer; transition: background 0.14s; text-align: left;
      }
      .suggestion-chip:hover { background: rgba(102,209,255,0.14); }

      /* ── Message bubbles ── */
      .msg { display: flex; gap: 9px; }
      .msg.user { flex-direction: row-reverse; }

      .msg-avatar {
        width: 28px; height: 28px; border-radius: 50%;
        display: grid; place-items: center;
        font-size: 0.68rem; font-weight: 800;
        flex-shrink: 0; margin-top: 2px;
      }
      .msg.assistant .msg-avatar {
        background: linear-gradient(135deg, rgba(102,209,255,0.22), rgba(36,163,135,0.28));
        border: 1px solid rgba(102,209,255,0.2); color: var(--accent);
      }
      .msg.user .msg-avatar {
        background: rgba(102,209,255,0.14);
        border: 1px solid rgba(102,209,255,0.18); color: var(--accent);
      }

      .msg-body { flex: 1; max-width: calc(100% - 37px); }
      .msg.user .msg-body { display: flex; flex-direction: column; align-items: flex-end; }

      .msg-meta {
        font-size: 0.66rem; color: var(--muted-2);
        margin-bottom: 4px; display: flex; align-items: center; gap: 6px;
      }
      .msg.user .msg-meta { flex-direction: row-reverse; }

      .msg-bubble {
        padding: 10px 13px; border-radius: 11px;
        line-height: 1.65; max-width: 100%;
        word-break: break-word; font-size: 0.83rem;
      }
      .msg.user .msg-bubble {
        background: rgba(102,209,255,0.14);
        border: 1px solid rgba(102,209,255,0.2);
        border-radius: 11px 4px 11px 11px;
      }
      .msg.assistant .msg-bubble {
        background: rgba(10, 22, 38, 0.85);
        border: 1px solid rgba(132,157,189,0.17);
        border-radius: 4px 11px 11px 11px;
      }
      .msg.thinking .msg-bubble { color: var(--muted-2); font-style: italic; }

      /* ── Markdown ── */
      .msg-bubble .md-h {
        font-size: 0.86rem; font-weight: 700;
        color: var(--accent); margin: 9px 0 3px;
      }
      .msg-bubble .md-h:first-child { margin-top: 0; }
      .msg-bubble .md-p { margin: 2px 0; }
      .msg-bubble .md-list { padding-left: 4px; margin: 5px 0; display: flex; flex-direction: column; gap: 2px; }
      .msg-bubble .md-li { padding-left: 11px; position: relative; color: var(--text); }
      .msg-bubble .md-li::before { content: "·"; position: absolute; left: 2px; color: var(--accent); font-weight: 900; }
      .msg-bubble .md-sep { height: 1px; background: var(--line); margin: 8px 0; }
      .msg-bubble .md-br { height: 5px; }
      .msg-bubble .md-tr {
        display: flex; gap: 0; border-bottom: 1px solid rgba(132,157,189,0.1);
        padding: 4px 0; font-size: 0.78rem;
      }
      .msg-bubble .md-tr span { flex: 1; padding-right: 8px; min-width: 50px; }
      .msg-bubble .md-tr:first-of-type { border-top: 1px solid rgba(132,157,189,0.1); color: var(--muted-2); font-size: 0.7rem; }
      .msg-bubble strong { color: var(--text); font-weight: 700; }

      /* ── Input area ── */
      .input-area {
        padding: 10px 14px 12px;
        border-top: 1px solid var(--line);
        background: rgba(6, 15, 28, 0.95);
        display: flex; gap: 9px; align-items: flex-end;
        flex-shrink: 0;
      }

      .input-wrap {
        flex: 1;
        background: rgba(10, 22, 38, 0.9);
        border: 1px solid rgba(132,157,189,0.2);
        border-radius: 11px;
        transition: border-color 0.2s;
        display: flex; align-items: flex-end;
      }
      .input-wrap:focus-within { border-color: rgba(102,209,255,0.35); }

      #chatInput {
        flex: 1; background: transparent; border: none; outline: none;
        resize: none; color: var(--text); font-family: inherit;
        font-size: 0.86rem; line-height: 1.5;
        padding: 9px 11px; max-height: 140px; overflow-y: auto;
      }
      #chatInput::placeholder { color: var(--muted-2); }

      .send-btn {
        width: 36px; height: 36px; border-radius: 9px; border: none;
        background: linear-gradient(135deg, rgba(102,209,255,0.28), rgba(36,163,135,0.24));
        color: var(--accent); font-size: 1rem; cursor: pointer;
        display: grid; place-items: center;
        transition: background 0.14s, opacity 0.14s; flex-shrink: 0;
      }
      .send-btn:hover { background: linear-gradient(135deg, rgba(102,209,255,0.42), rgba(36,163,135,0.36)); }
      .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

      /* ── Responsive ── */
      @media (max-width: 900px) {
        .shell { grid-template-columns: 1fr; height: auto; overflow: visible; }
        html, body { overflow: auto; }
        .matrix-col { height: 50vh; border-right: none; border-bottom: 1px solid var(--line); }
        .chat-col { height: 55vh; }
        .messages { overflow-y: auto; }
      }
    </style>
  </head>
  <body>

    <header class="topbar">
      <div class="brand-mark">Sα</div>
      <span class="brand-name">SummerMax Alpha</span>
      <div class="topbar-divider"></div>
      <nav class="page-nav">
        <a href="index.html">首页</a>
        <a href="scan.html">市场扫描</a>
        <a href="workspace.html">工作台</a>
        <a href="chat.html" class="active">AI 分析师</a>
      </nav>
      <div class="topbar-spacer"></div>
      <button class="clear-btn" id="clearBtn">清空对话</button>
    </header>

    <div class="market-bar" id="marketBar">
      <span class="mkt-loading">正在获取市场数据…</span>
    </div>

    <div class="shell">

      <!-- ── Left: Full market matrix ── -->
      <div class="matrix-col">
        <div class="matrix-head">
          <div class="matrix-stats-bar">
            <div class="stat-chips" id="matrixStats">
              <span class="mkt-loading">加载全市场数据…</span>
            </div>
            <span id="aiContextNote" style="font-size:0.66rem;color:var(--muted-2)"></span>
          </div>
          <div class="matrix-controls">
            <input type="text" id="stockSearch" placeholder="搜索代码 / 名称…" autocomplete="off" />
            <div class="sort-tabs">
              <button class="sort-tab active" data-sort="chg">涨幅</button>
              <button class="sort-tab" data-sort="amount">成交额</button>
              <button class="sort-tab" data-sort="turn">换手率</button>
              <button class="sort-tab" data-sort="volr">量比</button>
            </div>
          </div>
          <div class="matrix-col-head">
            <span>#</span>
            <span>代码 / 名称</span>
            <span style="text-align:right">现价</span>
            <span style="text-align:right">涨跌幅</span>
            <span style="text-align:right">成交额</span>
            <span style="text-align:right">换手率</span>
            <span></span>
          </div>
        </div>
        <div id="matrixLoading" class="matrix-loading">
          <div>正在并行获取全市场数据…</div>
          <div style="margin-top:6px;font-size:0.72rem">预计 3–5 秒，覆盖全部 A 股</div>
        </div>
        <div id="matrixList"></div>
      </div>

      <!-- ── Right: AI Chat ── -->
      <div class="chat-col">
        <div class="messages" id="messages">
          <div class="empty-state" id="emptyState">
            <div class="empty-icon">◈</div>
            <div class="empty-title">AI 分析师已就绪</div>
            <div class="empty-desc">我能读取左侧全部 A 股实时数据，帮你按任意理论筛选短中线机会。</div>
            <div class="suggestions">
              <button class="suggestion-chip" data-q="根据苏紫叶理论，今日A股里短中线大概率大涨、位置不高、逻辑硬有产业支撑的是哪几只？给进场条件和止损">苏紫叶理论选股</button>
              <button class="suggestion-chip" data-q="今日AI算力/机器人板块里最值得关注的3只票，给进场价格和止损位">AI主线精选</button>
              <button class="suggestion-chip" data-q="今天大盘整体走势怎么样？上涨下跌比例如何？今天适合进攻还是防守？">今日大盘研判</button>
              <button class="suggestion-chip" data-q="今日换手率最高且涨幅在3%-9%之间的票有哪些？哪只最值得追？">高换手强势股</button>
            </div>
          </div>
        </div>

        <div class="input-area">
          <div class="input-wrap">
            <textarea id="chatInput" placeholder="问我任何关于今日A股的问题，或让我直接推荐票…" rows="1"></textarea>
          </div>
          <button class="send-btn" id="sendBtn" title="发送 (⌘+Enter)">↑</button>
        </div>
      </div>

    </div>

    <script src="chat.js"></script>
  </body>
</html>
