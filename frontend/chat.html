<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>SummerMax Alpha · AI 分析师</title>
    <link rel="stylesheet" href="/app/theme.css?v=20260624-hotfix2" />
    <style>
      :root {
        --bg: #07111f;
        --panel: rgba(10, 22, 38, 0.9);
        --line: rgba(132, 157, 189, 0.15);
        --text: #edf4ff;
        --muted: #8ea3bd;
        --muted-2: #5a7490;
        --accent: #66d1ff;
        --bull: #2ed09a;
        --bear: #ff6b7e;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        height: 100%;
        color: var(--text);
        font-family: "PingFang SC", "Noto Sans SC", "Avenir Next", sans-serif;
        font-size: 14px;
        background: #07111f;
        overflow: hidden;
      }

      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(102,209,255,0.18); border-radius: 2px; }

      .up { color: var(--bull); }
      .down { color: var(--bear); }

      /* ── Topbar ── */
      .topbar {
        height: 48px;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 0 16px;
        border-bottom: 1px solid var(--line);
        background: rgba(6, 15, 28, 0.98);
        position: relative;
        z-index: 100;
        flex-shrink: 0;
      }

      .brand-mark {
        display: grid;
        place-items: center;
        width: 30px; height: 30px;
        border-radius: 8px;
        background: linear-gradient(135deg, rgba(102,209,255,0.22), rgba(36,163,135,0.28));
        border: 1px solid rgba(102,209,255,0.2);
        font-size: 0.78rem; font-weight: 800;
        flex-shrink: 0;
      }

      .brand-name { font-size: 0.88rem; font-weight: 700; white-space: nowrap; }

      .topbar-divider { width: 1px; height: 20px; background: var(--line); flex-shrink: 0; }

      .page-nav { display: flex; gap: 2px; }
      .page-nav a {
        padding: 5px 10px; border-radius: 8px;
        text-decoration: none; color: var(--muted);
        font-size: 0.82rem;
        transition: background 0.15s, color 0.15s;
      }
      .page-nav a:hover { background: rgba(255,255,255,0.05); color: var(--text); }
      .page-nav a.active { background: rgba(102,209,255,0.12); color: var(--accent); font-weight: 700; }

      .topbar-spacer { flex: 1; }

      .user-badge {
        display: flex; align-items: center; gap: 8px;
        flex-shrink: 0;
      }

      .user-email {
        font-size: 0.76rem; color: var(--muted);
        max-width: 160px; overflow: hidden;
        text-overflow: ellipsis; white-space: nowrap;
      }

      .user-role {
        font-size: 0.66rem; padding: 2px 7px;
        border-radius: 5px;
        background: rgba(102,209,255,0.1);
        border: 1px solid rgba(102,209,255,0.15);
        color: var(--muted-2);
      }

      .user-role.admin {
        background: rgba(255,195,50,0.12);
        border-color: rgba(255,195,50,0.2);
        color: #ffc332;
      }

      .logout-btn {
        padding: 4px 10px; border-radius: 7px;
        border: 1px solid rgba(132,157,189,0.2);
        background: transparent; color: var(--muted-2);
        font-size: 0.74rem; cursor: pointer;
        transition: color 0.15s, border-color 0.15s;
      }
      .logout-btn:hover { color: var(--bear); border-color: rgba(255,107,126,0.3); }

      .clear-btn {
        padding: 5px 12px; border-radius: 8px;
        border: 1px solid rgba(132,157,189,0.2);
        background: transparent; color: var(--muted-2);
        font-size: 0.76rem; cursor: pointer;
        transition: color 0.15s, border-color 0.15s;
        white-space: nowrap;
      }
      .clear-btn:hover { color: var(--bear); border-color: rgba(255,107,126,0.3); }

      /* ── Market bar ── */
      .market-bar {
        display: flex; align-items: center; gap: 14px;
        padding: 6px 16px;
        border-bottom: 1px solid var(--line);
        background: rgba(5, 12, 24, 0.7);
        flex-shrink: 0;
        overflow-x: auto; white-space: nowrap;
        font-size: 0.75rem;
        height: 34px;
      }
      .market-bar::-webkit-scrollbar { height: 2px; }

      .mkt-idx { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
      .mkt-idx-name { color: var(--muted-2); }
      .mkt-idx-price { font-weight: 700; }
      .mkt-divider { width: 1px; height: 12px; background: var(--line); flex-shrink: 0; }
      .mkt-sector {
        display: inline-flex; align-items: center; gap: 4px;
        padding: 1px 7px; border-radius: 5px;
        background: rgba(102,209,255,0.06);
        border: 1px solid rgba(102,209,255,0.1);
        font-size: 0.7rem; flex-shrink: 0;
      }
      .mkt-label { color: var(--muted-2); font-size: 0.68rem; letter-spacing: 0.05em; }
      .mkt-loading { color: var(--muted-2); font-size: 0.74rem; font-style: italic; }

      /* ── Main shell ── */
      .shell {
        display: grid;
        grid-template-columns: 430px 1fr;
        height: calc(100vh - 48px - 34px);
        overflow: hidden;
      }

      /* ══════════════════════════════════════════
         LEFT: Full-market matrix
      ══════════════════════════════════════════ */
      .matrix-col {
        border-right: 1px solid var(--line);
        display: flex; flex-direction: column;
        overflow: hidden;
        background: rgba(5, 12, 24, 0.4);
      }

      .matrix-head {
        flex-shrink: 0;
        border-bottom: 1px solid var(--line);
        background: rgba(5, 13, 26, 0.9);
      }

      .matrix-stats-bar {
        display: flex; align-items: center; justify-content: space-between;
        padding: 7px 12px 6px;
        font-size: 0.72rem; color: var(--muted-2);
        border-bottom: 1px solid rgba(132,157,189,0.08);
      }

      .stat-chips { display: flex; gap: 8px; align-items: center; }
      .stat-chip { display: flex; align-items: center; gap: 3px; }
      .stat-count { font-weight: 700; font-size: 0.8rem; }
      .stat-total { color: var(--accent); font-weight: 700; }

      .matrix-controls {
        display: flex; align-items: center; gap: 8px;
        padding: 6px 12px;
        border-bottom: 1px solid rgba(132,157,189,0.08);
      }

      #stockSearch {
        flex: 1; background: rgba(10,22,38,0.8);
        border: 1px solid rgba(132,157,189,0.18);
        border-radius: 7px; color: var(--text);
        font-family: inherit; font-size: 0.78rem;
        padding: 5px 10px; outline: none;
      }
      #stockSearch::placeholder { color: var(--muted-2); }
      #stockSearch:focus { border-color: rgba(102,209,255,0.3); }

      .sort-tabs { display: flex; gap: 3px; flex-shrink: 0; }
      .sort-tab {
        padding: 4px 8px; border-radius: 6px;
        border: 1px solid rgba(132,157,189,0.15);
        background: transparent; color: var(--muted-2);
        font-size: 0.72rem; cursor: pointer;
        transition: all 0.12s;
        white-space: nowrap;
      }
      .sort-tab:hover { color: var(--text); border-color: rgba(132,157,189,0.3); }
      .sort-tab.active { background: rgba(102,209,255,0.12); color: var(--accent); border-color: rgba(102,209,255,0.22); font-weight: 700; }

      .matrix-col-head {
        display: grid;
        grid-template-columns: 28px 1fr 62px 68px 64px 54px 50px;
        gap: 4px;
        padding: 5px 12px;
        font-size: 0.67rem; color: var(--muted-2);
        letter-spacing: 0.03em;
      }

      #matrixList { flex: 1; overflow-y: auto; }

      .matrix-row {
        display: grid;
        grid-template-columns: 28px 1fr 62px 68px 64px 54px 50px;
        gap: 4px;
        align-items: center;
        padding: 5px 12px;
        border-bottom: 1px solid rgba(132,157,189,0.055);
        transition: background 0.08s;
        cursor: default;
      }
      .matrix-row:hover { background: rgba(102,209,255,0.04); }

      .mx-rank { color: var(--muted-2); font-size: 0.68rem; text-align: center; }
      .mx-id { display: flex; flex-direction: column; gap: 1px; min-width: 0; }
      .mx-code { font-size: 0.72rem; font-weight: 700; color: var(--accent); }
      .mx-name { font-size: 0.7rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .mx-price { font-size: 0.78rem; font-weight: 600; text-align: right; }
      .mx-chg { font-size: 0.8rem; font-weight: 700; text-align: right; }
      .mx-amount { font-size: 0.72rem; color: var(--muted); text-align: right; }
      .mx-turn { font-size: 0.72rem; color: var(--muted); text-align: right; }

      .btn-analyze-sm {
        display: inline-flex; align-items: center; justify-content: center;
        padding: 3px 7px; border-radius: 6px;
        background: rgba(102,209,255,0.1);
        border: 1px solid rgba(102,209,255,0.18);
        color: var(--text); text-decoration: none;
        font-size: 0.68rem; font-weight: 700;
        transition: background 0.12s; white-space: nowrap;
      }
      .btn-analyze-sm:hover { background: rgba(102,209,255,0.22); }

      .matrix-loading {
        padding: 20px 14px;
        color: var(--muted-2); font-size: 0.8rem;
        line-height: 1.8; text-align: center;
      }

      .matrix-empty {
        padding: 20px 14px;
        color: var(--muted-2); font-size: 0.8rem;
        text-align: center;
      }

      /* ══════════════════════════════════════════
         RIGHT: Chat
      ══════════════════════════════════════════ */
      .chat-col {
        display: flex; flex-direction: column;
        overflow: hidden;
      }

      .messages {
        flex: 1; overflow-y: auto;
        padding: 18px 18px 10px;
        display: flex; flex-direction: column;
        gap: 16px;
      }

      .empty-state {
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        flex: 1; gap: 12px;
        color: var(--muted-2); text-align: center; padding: 30px 20px;
      }
      .empty-icon { font-size: 2.4rem; opacity: 0.25; }
      .empty-title { font-size: 1.05rem; font-weight: 700; color: var(--muted); }
      .empty-desc { font-size: 0.85rem; line-height: 1.8; max-width: 340px; color: var(--muted-2); }

      .suggestions {
        display: grid; grid-template-columns: 1fr 1fr;
        gap: 7px; width: 100%; max-width: 440px; margin-top: 4px;
      }
      .suggestion-chip {
        padding: 8px 12px; border-radius: 10px;
        border: 1px solid rgba(102,209,255,0.18);
        background: rgba(10,22,38,0.7);
        color: var(--muted); font-size: 0.78rem; font-family: inherit;
        cursor: pointer; transition: all 0.15s; text-align: left;
        line-height: 1.4;
      }
      .suggestion-chip:hover { background: rgba(102,209,255,0.1); border-color: rgba(102,209,255,0.32); color: var(--text); }

      /* ── Message bubbles ── */
      .msg { display: flex; gap: 10px; }
      .msg.user { flex-direction: row-reverse; }

      .msg-avatar {
        width: 32px; height: 32px; border-radius: 50%;
        display: grid; place-items: center;
        font-size: 0.72rem; font-weight: 800;
        flex-shrink: 0; margin-top: 2px;
      }
      .msg.assistant .msg-avatar {
        background: linear-gradient(135deg, rgba(102,209,255,0.22), rgba(36,163,135,0.28));
        border: 1px solid rgba(102,209,255,0.2); color: var(--accent);
      }
      .msg.user .msg-avatar {
        background: rgba(102,209,255,0.14);
        border: 1px solid rgba(102,209,255,0.18); color: var(--accent);
      }

      .msg-body { flex: 1; max-width: calc(100% - 42px); }
      .msg.user .msg-body { display: flex; flex-direction: column; align-items: flex-end; }

      .msg-meta {
        font-size: 0.7rem; color: var(--muted-2);
        margin-bottom: 5px; display: flex; align-items: center; gap: 6px;
      }
      .msg.user .msg-meta { flex-direction: row-reverse; }

      .msg-bubble {
        padding: 12px 15px; border-radius: 12px;
        line-height: 1.75; max-width: 100%;
        word-break: break-word; font-size: 0.9rem;
      }
      .msg.user .msg-bubble {
        background: rgba(102,209,255,0.14);
        border: 1px solid rgba(102,209,255,0.2);
        border-radius: 12px 4px 12px 12px;
      }
      .msg.assistant .msg-bubble {
        background: rgba(10, 22, 38, 0.85);
        border: 1px solid rgba(132,157,189,0.17);
        border-radius: 4px 12px 12px 12px;
      }
      .msg.thinking .msg-bubble { color: var(--muted-2); font-style: italic; }

      /* Animated thinking dots */
      .thinking-dots { display: inline-flex; gap: 4px; align-items: center; vertical-align: middle; }
      .thinking-dots span {
        width: 5px; height: 5px; border-radius: 50%;
        background: var(--muted-2); display: inline-block;
        animation: dotPulse 1.4s infinite ease-in-out;
      }
      .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
      .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
      @keyframes dotPulse { 0%,80%,100% { transform: scale(0.6); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }

      /* ── Markdown ── */
      .msg-bubble .md-h {
        font-size: 0.95rem; font-weight: 700;
        color: var(--accent); margin: 10px 0 4px;
      }
      .msg-bubble .md-h:first-child { margin-top: 0; }
      .msg-bubble .md-p { margin: 3px 0; }
      .msg-bubble .md-list { padding-left: 4px; margin: 6px 0; display: flex; flex-direction: column; gap: 3px; }
      .msg-bubble .md-li { padding-left: 13px; position: relative; color: var(--text); }
      .msg-bubble .md-li::before { content: "·"; position: absolute; left: 2px; color: var(--accent); font-weight: 900; }
      .msg-bubble .md-sep { height: 1px; background: var(--line); margin: 8px 0; }
      .msg-bubble .md-br { height: 6px; }
      .msg-bubble .md-tr {
        display: flex; gap: 0; border-bottom: 1px solid rgba(132,157,189,0.1);
        padding: 4px 0; font-size: 0.82rem;
      }
      .msg-bubble .md-tr span { flex: 1; padding-right: 8px; min-width: 50px; }
      .msg-bubble .md-tr:first-of-type { border-top: 1px solid rgba(132,157,189,0.1); color: var(--muted-2); font-size: 0.75rem; }
      .msg-bubble strong { color: var(--text); font-weight: 700; }

      /* ── Input area ── */
      .input-area {
        padding: 12px 16px 14px;
        border-top: 1px solid var(--line);
        background: rgba(6, 15, 28, 0.98);
        display: flex; flex-direction: column; gap: 8px;
        flex-shrink: 0;
      }

      .input-row { display: flex; gap: 9px; align-items: flex-end; }

      .input-wrap {
        flex: 1;
        background: rgba(10, 22, 38, 0.9);
        border: 1px solid rgba(132,157,189,0.22);
        border-radius: 12px;
        transition: border-color 0.2s;
        display: flex; align-items: flex-end;
      }
      .input-wrap:focus-within { border-color: rgba(102,209,255,0.4); }

      #chatInput {
        flex: 1; background: transparent; border: none; outline: none;
        resize: none; color: var(--text); font-family: inherit;
        font-size: 0.93rem; line-height: 1.55;
        padding: 10px 12px; max-height: 140px; overflow-y: auto;
      }
      #chatInput::placeholder { color: var(--muted-2); }

      .send-btn {
        width: 38px; height: 38px; border-radius: 10px; border: none;
        background: linear-gradient(135deg, rgba(102,209,255,0.28), rgba(36,163,135,0.24));
        color: var(--accent); font-size: 1.1rem; cursor: pointer;
        display: grid; place-items: center;
        transition: background 0.14s, opacity 0.14s; flex-shrink: 0;
      }
      .send-btn:hover:not(:disabled) { background: linear-gradient(135deg, rgba(102,209,255,0.42), rgba(36,163,135,0.36)); }
      .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

      .abort-btn {
        padding: 5px 13px; border-radius: 8px;
        border: 1px solid rgba(255,107,126,0.3);
        background: rgba(255,107,126,0.08); color: var(--bear);
        font-family: inherit; font-size: 0.78rem; cursor: pointer;
        transition: background 0.14s; display: none; align-self: flex-end;
      }
      .abort-btn:hover { background: rgba(255,107,126,0.16); }
      .abort-btn.visible { display: block; }

      .input-hint { font-size: 0.7rem; color: var(--muted-2); text-align: right; }

      /* ── Mobile panel toggle bar ── */
      .mobile-panel-tabs {
        display: none;
      }

      /* ── Responsive ── */
      @media (max-width: 960px) {
        /* Tablet: shrink left panel */
        .shell { grid-template-columns: 360px 1fr; }
      }

      @media (max-width: 720px) {
        /* Mobile: single column with tab toggle */
        html, body { overflow: auto; }

        .topbar .page-nav { display: none; }
        .topbar .topbar-divider { display: none; }
        .brand-name { display: none; }

        .mobile-panel-tabs {
          display: flex;
          background: rgba(5, 13, 26, 0.98);
          border-bottom: 1px solid var(--line);
          flex-shrink: 0;
        }
        .mobile-panel-tabs button {
          flex: 1; padding: 10px 0;
          border: none; background: transparent;
          color: var(--muted-2); font-size: 0.82rem; font-weight: 600;
          cursor: pointer; border-bottom: 2px solid transparent;
          font-family: inherit; transition: all 0.15s;
        }
        .mobile-panel-tabs button.active {
          color: var(--accent); border-bottom-color: var(--accent);
        }

        .shell {
          grid-template-columns: 1fr;
          height: auto;
          overflow: visible;
        }

        /* Default: show chat, hide matrix */
        .matrix-col {
          display: none;
          border-right: none;
        }
        .chat-col {
          height: calc(100svh - 48px - 34px - 42px);
          display: flex;
          flex-direction: column;
        }
        .messages { overflow-y: auto; flex: 1; }
        .input-area { flex-shrink: 0; }

        /* When matrix tab active */
        .shell.show-matrix .matrix-col {
          display: flex;
          height: calc(100svh - 48px - 34px - 42px);
        }
        .shell.show-matrix .chat-col { display: none; }

        /* Matrix list needs explicit height */
        .shell.show-matrix #matrixList { overflow-y: auto; }
      }

      /* ── Left panel tabs ── */
      .left-tabs {
        display: flex;
        border-bottom: 1px solid var(--line);
        background: rgba(5, 13, 26, 0.95);
        flex-shrink: 0;
      }
      .left-tab {
        flex: 1; padding: 8px 0;
        border: none; background: transparent;
        color: var(--muted-2); font-size: 0.78rem; font-weight: 600;
        cursor: pointer; border-bottom: 2px solid transparent;
        font-family: inherit; transition: all 0.15s;
      }
      .left-tab:hover { color: var(--muted); }
      .left-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

      #matrixView { display: flex; flex-direction: column; flex: 1; overflow: hidden; }

      /* ── Portfolio panel ── */
      #portfolioView { display: none; flex-direction: column; flex: 1; overflow: hidden; }

      .portfolio-toolbar {
        display: flex; align-items: center; justify-content: space-between;
        padding: 8px 12px;
        border-bottom: 1px solid var(--line);
        background: rgba(5, 13, 26, 0.9);
        flex-shrink: 0;
      }
      .portfolio-toolbar-label { font-size: 0.7rem; color: var(--muted-2); }

      .btn-add-pos {
        padding: 4px 11px; border-radius: 7px;
        border: 1px solid rgba(102,209,255,0.22);
        background: rgba(102,209,255,0.08);
        color: var(--accent); font-size: 0.74rem; font-family: inherit;
        cursor: pointer; transition: background 0.14s;
      }
      .btn-add-pos:hover { background: rgba(102,209,255,0.16); }

      .pos-form {
        padding: 10px 12px;
        border-bottom: 1px solid var(--line);
        background: rgba(10, 22, 38, 0.7);
        display: flex; flex-direction: column; gap: 7px;
        flex-shrink: 0;
      }
      .pos-form input {
        background: rgba(10,22,38,0.8);
        border: 1px solid rgba(132,157,189,0.2);
        border-radius: 7px; color: var(--text);
        font-family: inherit; font-size: 0.8rem;
        padding: 6px 9px; outline: none; width: 100%;
      }
      .pos-form input:focus { border-color: rgba(102,209,255,0.3); }
      .pos-form-btns { display: flex; gap: 7px; }
      .pos-form-btns button {
        flex: 1; padding: 6px 0; border-radius: 7px; border: none;
        font-family: inherit; font-size: 0.78rem; cursor: pointer; font-weight: 600;
      }
      .btn-pos-submit {
        background: linear-gradient(135deg, rgba(102,209,255,0.28), rgba(36,163,135,0.24));
        color: var(--accent); border: 1px solid rgba(102,209,255,0.22);
      }
      .btn-pos-cancel { background: rgba(132,157,189,0.1); color: var(--muted-2); border: 1px solid rgba(132,157,189,0.15); }

      #portfolioList { flex: 1; overflow-y: auto; }

      .pos-empty {
        padding: 24px 14px; text-align: center;
        color: var(--muted-2); font-size: 0.8rem; line-height: 1.7;
      }

      .pos-row {
        padding: 8px 12px;
        border-bottom: 1px solid rgba(132,157,189,0.055);
        transition: background 0.08s;
      }
      .pos-row:hover { background: rgba(102,209,255,0.04); }
      .pos-row-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 4px; }
      .pos-stock { display: flex; flex-direction: column; gap: 1px; }
      .pos-code { font-size: 0.72rem; font-weight: 700; color: var(--accent); }
      .pos-name { font-size: 0.7rem; color: var(--muted); }
      .pos-pl { font-size: 0.88rem; font-weight: 700; text-align: right; }
      .pos-row-bottom { display: flex; align-items: center; gap: 6px; font-size: 0.68rem; color: var(--muted-2); }
      .pos-buy-info { flex: 1; }
      .pos-delete {
        padding: 2px 7px; border-radius: 5px;
        border: 1px solid rgba(255,107,126,0.2);
        background: transparent; color: rgba(255,107,126,0.6);
        font-size: 0.68rem; cursor: pointer; font-family: inherit;
        transition: all 0.12s; flex-shrink: 0;
      }
      .pos-delete:hover { background: rgba(255,107,126,0.1); color: var(--bear); border-color: rgba(255,107,126,0.4); }
      .pos-delete:disabled { opacity: 0.4; cursor: not-allowed; }
    </style>
  </head>
  <body>

    <header class="topbar">
      <div class="brand-mark">Sα</div>
      <span class="brand-name">SummerMax Alpha</span>
      <div class="topbar-divider"></div>
      <nav class="page-nav">
        <a href="/home">首页</a>
        <a href="/scan">市场扫描</a>
        <a href="/workspace">工作台</a>
        <a href="/chat" class="active">AI 分析师</a>
        <a href="/tools">工具箱</a>
        <a href="/settings">设置</a>
      </nav>
      <div class="topbar-spacer"></div>
      <div class="user-badge" id="userBadge"></div>
      <button class="theme-toggle" onclick="__toggleTheme()" title="切换浅色模式">☀</button>
      <button class="clear-btn" id="clearBtn">清空对话</button>
    </header>

    <div class="market-bar" id="marketBar">
      <span class="mkt-loading">正在获取市场数据…</span>
    </div>

    <div class="shell" id="mainShell">

      <!-- Mobile-only panel toggle (hidden on desktop via CSS) -->
      <div class="mobile-panel-tabs" id="mobilePanelTabs" style="grid-column:1/-1">
        <button id="mobileTabChat" class="active" onclick="switchMobilePanel('chat')">AI 分析师</button>
        <button id="mobileTabMatrix" onclick="switchMobilePanel('matrix')">行情矩阵</button>
      </div>

      <!-- ── Left: Full market matrix ── -->
      <div class="matrix-col">

        <!-- Tab switcher -->
        <div class="left-tabs">
          <button class="left-tab active" data-tab="matrix">全市场</button>
          <button class="left-tab" data-tab="portfolio">我的持仓</button>
        </div>

        <!-- Market matrix view -->
        <div id="matrixView">
          <div class="matrix-head">
            <div class="matrix-stats-bar">
              <div class="stat-chips" id="matrixStats">
                <span class="mkt-loading">加载全市场数据…</span>
              </div>
              <span id="aiContextNote" style="font-size:0.66rem;color:var(--muted-2)"></span>
            </div>
            <div class="matrix-controls">
              <input type="text" id="stockSearch" placeholder="搜索代码 / 名称…" autocomplete="off" />
              <div class="sort-tabs">
                <button class="sort-tab active" data-sort="chg">涨幅</button>
                <button class="sort-tab" data-sort="amount">成交额</button>
                <button class="sort-tab" data-sort="turn">换手率</button>
                <button class="sort-tab" data-sort="volr">量比</button>
              </div>
            </div>
            <div class="matrix-col-head">
              <span>#</span>
              <span>代码 / 名称</span>
              <span style="text-align:right">现价</span>
              <span style="text-align:right">涨跌幅</span>
              <span style="text-align:right">成交额</span>
              <span style="text-align:right">换手率</span>
              <span></span>
            </div>
          </div>
          <div id="matrixLoading" class="matrix-loading">
            <div>正在并行获取全市场数据…</div>
            <div style="margin-top:6px;font-size:0.72rem">预计 3–5 秒，覆盖全部 A 股</div>
          </div>
          <div id="matrixList"></div>
        </div>

        <!-- Portfolio view -->
        <div id="portfolioView">
          <div class="portfolio-toolbar">
            <span class="portfolio-toolbar-label">记录买入价，实时追踪盈亏</span>
            <button class="btn-add-pos" id="addPosBtn">+ 添加持仓</button>
          </div>
          <div id="addPosForm" class="pos-form" style="display:none">
            <input type="text" id="posCode" placeholder="股票代码（6位数字）" maxlength="6" inputmode="numeric" autocomplete="off" />
            <input type="number" id="posBuyPrice" placeholder="买入价格（元）" step="0.01" min="0.01" />
            <input type="number" id="posShares" placeholder="持仓手数（可选）" step="1" min="0" />
            <div class="pos-form-btns">
              <button class="btn-pos-submit" id="posSubmitBtn">确认添加</button>
              <button class="btn-pos-cancel" id="posCancelBtn">取消</button>
            </div>
          </div>
          <div id="portfolioList">
            <div class="pos-empty">暂无持仓记录<br>点击「+ 添加持仓」开始跟踪</div>
          </div>
        </div>

      </div>

      <!-- ── Right: AI Chat ── -->
      <div class="chat-col">
        <div class="messages" id="messages">
          <div class="empty-state" id="emptyState">
            <div class="empty-icon">◈</div>
            <div class="empty-title">AI 分析师已就绪</div>
            <div class="empty-desc">我能读取左侧全部 A 股实时数据，帮你按任意理论筛选短中线机会。</div>
            <div class="suggestions">
              <button class="suggestion-chip" data-q="现在是尾盘时段，给我3只今日可以尾盘买入、明天或后天大概率涨的票。每只给出：买入价区间、T+1目标价（预计涨幅%）、止损价位、看多逻辑">⚡ 尾盘精选买入</button>
              <button class="suggestion-chip" data-q="根据苏紫叶理论，今日A股里短中线大概率大涨、位置不高、逻辑硬有产业支撑的是哪几只？每只给买入区间、T+2目标价和止损位">苏紫叶理论选股</button>
              <button class="suggestion-chip" data-q="今天大盘整体走势、上涨下跌比例、主力资金方向，今天适合进攻还是防守？该买什么类型的票？">今日大盘研判</button>
              <button class="suggestion-chip" data-q="今日换手率3%-15%、涨幅3%-9%、成交额超1亿的强势股有哪些？哪只最值得明日持续关注？给具体目标价">高换手强势股</button>
              <button class="suggestion-chip" data-q="给我这周完整的操作计划：推荐2-3只这周买入的标的（含买入价、目标价、止损位）；如果我有持仓的话哪些该卖出；有没有潜力暴涨的黑马股？要具体可执行的方案">📋 本周操作计划</button>
              <button class="suggestion-chip" data-q="今日全市场有哪些潜力暴涨的黑马股？筛选条件：量比≥2、换手率≥5%、涨幅在2%-8%之间、成交额≥5000万。分析每只的暴涨逻辑和目标涨幅">🚀 暴涨黑马挖掘</button>
            </div>
          </div>
        </div>

        <div class="input-area">
          <div class="input-row">
            <div class="input-wrap">
              <textarea id="chatInput" placeholder="问我任何关于今日A股的问题，或让我直接推荐票…" rows="1"></textarea>
            </div>
            <button class="send-btn" id="sendBtn" title="发送 (⌘+Enter / Ctrl+Enter)">↑</button>
            <button class="abort-btn" id="abortBtn">取消</button>
          </div>
          <div class="input-hint">⌘+Enter 发送 · 左侧全市场数据已接入 AI 上下文</div>
        </div>
      </div>

    </div>

    <script src="/app/theme.js?v=20260624-hotfix2"></script>
    <script src="/app/chat.js?v=20260624-hotfix2"></script>
  </body>
</html>
